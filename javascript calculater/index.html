<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>javascript calculater</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/012b5e9d08.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="container">
        <div class="result-show">
            <div class="head-main">
                <div class="head-cal">
                    <h3>JS <br>Calculator</h3>
                    <i class="fa-solid fa-clock-rotate-left"></i>
    
                </div>
                <div class="input">
                    <input type="text" id="save">
            
                    <input type="text" id="inputResult">
                </div>
            </div>

            <div class="number">
                <div class="displayNum">
                    <button onclick="clc('')">AC</button>
                    <button onclick="del()"><i class="fa-solid fa-delete-left"></i></button>
                    <button onclick="setnumber('%')">%</button>
                    <button class="color" onclick="setnumber('/')"><i class="fa-solid fa-divide"></i></button>
                </div>
                <div class="displayNum">
                    <button onclick="setnumber(7)">7</button>
                    <button onclick="setnumber(8)">8</button>
                    <button onclick="setnumber(9)">9</button>
                    <button class="color" onclick="setnumber('*')">X</button>
                    
                </div>
                <div class="displayNum">
                    <button onclick="setnumber(5)">5</button>
                    <button onclick="setnumber(4)">4</button>
                    <button onclick="setnumber(6)">6</button>
                    <button class="color" onclick="setnumber('-')">-</button>
                    
                </div>
                <div class="displayNum">
                    <button onclick="setnumber(1)">1</button>
                    <button onclick="setnumber(2)">2</button>
                    <button onclick="setnumber(3)">3</button>
                    <button class="color" onclick="setnumber('+')">+</button>
                    
                </div>
                <div class="displayNum">
                    <button onclick="setnumber('.')">.</button>
                    <button onclick="setnumber(0)">0</button>
                    <button onclick="setnumber('-')">+/-</button>
                    <button class="color" onclick="getResult()">=</button>
                    
                </div>
            </div>
            

        </div>
    </div>
</body>
<script src="script.js"></script>
</html>
